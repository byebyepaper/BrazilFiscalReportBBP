name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}-latest
    # Migracao ws360 (Fase 2): alvo 3.12/3.13; 3.14 e o burndown final
    # (deprecacao de bool(Element) do ElementTree ainda emite warnings).
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {name: "Python 3.12", python: "3.12", os: "ubuntu"}
          - {name: "Python 3.13", python: "3.13", os: "ubuntu"}
          - {name: "Python 3.14", python: "3.14", os: "ubuntu", experimental: true}
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install qpdf ⚙️
        run: sudo apt-get update --allow-releaseinfo-change && sudo apt-get install qpdf
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools fpdf2 phonenumbers python-barcode pytest qrcode  pytest-cov click PyYAML
      - name: Test
        run: |
          pytest --cov=./brazilfiscalreport --cov-report=xml --cov-branch --doctest-glob="docs/*.md"
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Engenere/BrazilFiscalReport
